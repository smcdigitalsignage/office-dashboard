<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>SMC Master Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100vw;height:100vh;overflow:hidden;background:#fff;font-family:'Arial Black', sans-serif;}
.wrapper{display:flex;flex-direction:column;width:100vw;height:100vh;border:4px solid #000;}

/* Header Section */
header{flex:0 0 10vh;display:flex;justify-content:space-between;align-items:center;padding:0 2vw;background:#fff;border-bottom:6px solid #ff0000;}
.main-logo{height:7vh;}
#clock{font-size:4vh;font-weight:900;color:#000;}

/* Main Dashboard Body */
.dashboard-body{flex:1;display:flex;background:#000;overflow:hidden;}

/* Column 1: Calendar and Crew */
.col-left{flex:0 0 65%;display:flex;flex-direction:column;border-right:4px solid #000;background:#fff;}
.calendar-container{flex:2;position:relative;overflow:hidden;border-bottom:4px solid #000;}
.calendar-container iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;}
.crew-container{flex:1;display:flex;flex-direction:column;}

/* Column 2: Rigging, Posted, Auctions */
.col-right{flex:0 0 35%;display:flex;flex-direction:column;background:#fff;}
.panel{flex:1;display:flex;flex-direction:column;border-bottom:4px solid #000;overflow:hidden;}
.panel:last-child{border-bottom:none;}

/* Styling */
.panel-header{background:#000;color:#fff;text-align:center;padding:0.6vh;font-size:1.8vh;border-bottom:3px solid #ff0000;text-transform:uppercase;}
.table-shell{flex:1;overflow-y:auto;}
table{width:100%;border-collapse:collapse;table-layout:fixed;}
th{background:#333;color:#fff;font-size:1.4vh;padding:0.8vh;text-align:center;text-transform:uppercase;}
td{border:1px solid #000;padding:1vh 0.4vw;font-size:1.6vh;font-weight:900;text-align:center;text-transform:uppercase;}

/* Crew Colors */
.status-in { background-color: #00ff00 !important; color: #000; } 
.status-break { background-color: #ffff00 !important; color: #000; } 
.status-out { background-color: #ff0000 !important; color: #fff; }

/* Ticker */
.ticker-bar{flex:0 0 5vh;background:#000;color:#fff;overflow:hidden;display:flex;align-items:center;border-top:4px solid #ff0000;}
.ticker-wrap{white-space:nowrap;display:inline-block;animation:scroll 35s linear infinite;font-size:2.5vh;font-weight:900;}
@keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
</style>
</head>
<body>
<div class="wrapper">
    <header>
        <img src="https://www.smithmachinery.com/wp-content/uploads/2021/05/logo.png" class="main-logo">
        <div id="clock">00:00:00 AM</div>
    </header>
    
    <div class="dashboard-body">
        <div class="col-left">
            <div class="calendar-container">
                <div class="panel-header" style="background:#ff0000;">Company Calendar</div>
                <iframe src="https://calendar.google.com/calendar/embed?src=smcdigitalsignage@gmail.com&ctz=America/Chicago&showTitle=0&showNav=0&showTabs=0&mode=WEEK"></iframe>
            </div>
            <div class="crew-container">
                <div class="panel-header">Live Crew Status</div>
                <div class="table-shell"><table><thead><tr><th>Name</th><th>Location</th><th>Status</th></tr></thead><tbody id="crew-feed"></tbody></table></div>
            </div>
        </div>

        <div class="col-right">
            <div class="panel">
                <div class="panel-header">Rigging Job List</div>
                <div class="table-shell"><table><thead><tr><th>Company</th><th>Project</th><th>Date</th></tr></thead><tbody id="rigging-feed"></tbody></table></div>
            </div>
            <div class="panel">
                <div class="panel-header">Posted Items</div>
                <div class="table-shell"><table><thead><tr><th>Date</th><th>Item</th></tr></thead><tbody id="posted-feed"></tbody></table></div>
            </div>
            <div class="panel">
                <div class="panel-header">Auctions</div>
                <div class="table-shell"><table><thead><tr><th>Date</th><th>Location</th></tr></thead><tbody id="auctions-feed"></tbody></table></div>
            </div>
        </div>
    </div>
    
    <div class="ticker-bar"><div class="ticker-wrap">Welcome Bobby & Dustin! | Daily Update Active | Safety First | Automated Equipment Tracking Active</div></div>
</div>

<script>
function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }
setInterval(updateClock, 1000); updateClock();

const sheetId = '1hGrL8qIobADDWp50jdB0Ch2IikuS8ZajyTiOwn5KB-4';

function fetchTab(tabName, targetId, isCrew, cols) {
    let s = document.createElement('script');
    s.src = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?sheet=${tabName}&tqx=out:json;responseHandler:handle${tabName}&cb=${Date.now()}`;
    document.body.appendChild(s);
    window[`handle${tabName}`] = function(res) {
        if (!res || !res.table) return;
        let html = '';
        res.table.rows.forEach((row, i) => {
            if(i === 0) return; 
            let cells = row.c.map(c => c ? c.v : "");
            let rowClass = "";
            if(isCrew){
                let s = String(cells[2]||"").toLowerCase();
                if(s.includes("in")) rowClass="status-in";
                else if(s.includes("break")||s.includes("lunch")) rowClass="status-break";
                else rowClass="status-out";
            }
            html += `<tr class="${rowClass}">`;
            for(let j=0; j<cols; j++) html += `<td>${cells[j] || ""}</td>`;
            html += `</tr>`;
        });
        document.getElementById(targetId).innerHTML = html;
    };
}

function refresh() {
    fetchTab('Crew', 'crew-feed', true, 3);
    fetchTab('Rigging', 'rigging-feed', false, 3);
    fetchTab('Posted', 'posted-feed', false, 2);
    fetchTab('Auctions', 'auctions-feed', false, 2);
}
refresh(); setInterval(refresh, 60000);
</script>
</body>
</html>
