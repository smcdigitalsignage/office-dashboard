<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100vw;height:100vh;overflow:hidden;background:#000;font-family:'Arial Black', sans-serif;}
.wrapper{display:flex;flex-direction:column;width:100vw;height:100vh;}

/* Header with Clock */
header{flex:0 0 10vh;display:flex;justify-content:space-between;align-items:center;padding:0 3vw;background:#fff;border-bottom:0.6vh solid #ff0000;}
.main-logo{height:8vh;}
#clock{font-size:4vh;color:#000;font-weight:900;}

/* Main Body */
.crew-container{flex:1;display:flex;flex-direction:column;background:#fff;padding:1vh;}
.panel-header{background:#000;color:#fff;text-align:center;padding:1.5vh;font-size:3vh;border-bottom:0.5vh solid #ff0000;text-transform:uppercase;}

table{width:100%;border-collapse:collapse;table-layout:fixed;}
th{background:#333;color:#fff;padding:1.5vh;font-size:2vh;text-align:left;text-transform:uppercase;}
td{border:0.2vh solid #000;padding:2.5vh 2vw;font-size:2.5vh;font-weight:900;text-transform:uppercase;}

/* Dynamic Status Colors */
.status-in { background-color: #00ff00 !important; color: #000; } 
.status-break { background-color: #ffff00 !important; color: #000; } 
.status-out { background-color: #ff0000 !important; color: #fff; }
</style>
</head>
<body>
<div class="wrapper">
    <header>
        <img src="https://www.smithmachinery.com/wp-content/uploads/2021/05/logo.png" class="main-logo">
        <div id="clock">00:00:00 AM</div>
    </header>
    <div class="crew-container">
        <div class="panel-header">Live Crew Status</div>
        <table>
            <thead>
                <tr>
                    <th style="width:25%;">Name</th>
                    <th style="width:45%;">Current Project</th>
                    <th style="width:30%;">Status</th>
                </tr>
            </thead>
            <tbody id="crew-feed">
                <tr><td colspan="3">Connecting to busybusy feed...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
// Live Clock Script
function updateClock() {
    const now = new Date();
    document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
}
setInterval(updateClock, 1000);
updateClock();

// Data Feed Script
function handleSheetData(response) {
    if (!response || !response.table || !response.table.rows) return;
    var rows = response.table.rows;
    var html = '';
    
    // Starting at i=1 to skip the header row in your sheet
    for (var i = 1; i < rows.length; i++) {
        var c = rows[i].c;
        if (!c || !c[0]) continue;
        
        var name = c[0].v || "";
        var project = c[1] ? c[1].v : "---";
        var status = c[2] ? c[2].v : "Offline";
        
        var rowClass = "";
        var icon = "";
        var sLower = status.toLowerCase();

        if (sLower.includes("break") || sLower.includes("lunch")) {
            rowClass = "status-break";
            icon = "☕ ";
        } else if (sLower.includes("in") || sLower.includes("working")) {
            rowClass = "status-in";
            icon = "🟢 ";
        } else {
            rowClass = "status-out";
            icon = "⛔ ";
        }

        html += `<tr class="${rowClass}">
                    <td>${name}</td>
                    <td>${project}</td>
                    <td>${icon}${status}</td>
                 </tr>`;
    }
    document.getElementById('crew-feed').innerHTML = html || '<tr><td colspan="3">No active crew data</td></tr>';
}

function updateData() {
    var script = document.createElement('script');
    // Using your specific Sheet ID
    script.src = 'https://docs.google.com/spreadsheets/d/1hGrL8qIobADDWp50jdB0Ch2IikuS8ZajyTiOwn5KB-4/gviz/tq?gid=0&tqx=out:json;responseHandler:handleSheetData&cb=' + new Date().getTime();
    document.body.appendChild(script);
}

setInterval(updateData, 60000); // Check for crew updates every 60 seconds
updateData();
</script>
</body>
</html>
